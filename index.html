<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جدول التصوير</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>جدول التصوير</h1>
        <p>نسخة بسيطة قابلة للنشر على GitHub Pages</p>
      </div>
      <div class="topbar-actions">
        <button id="tableViewBtn" class="active">الجدول</button>
        <button id="calendarViewBtn">التقويم</button>
        <button id="manageBtn">إدارة الأشخاص</button>
        <button id="addTaskBtn">إضافة مهمة</button>
      </div>
    </header>

    <section class="filters card">
      <input id="searchInput" type="text" placeholder="ابحث باسم أو أسبوع أو سكربت" />
      <select id="statusFilter">
        <option value="الكل">كل الحالات</option>
        <option value="مجدول">مجدول</option>
        <option value="قيد التنفيذ">قيد التنفيذ</option>
        <option value="مكتمل">مكتمل</option>
        <option value="مؤجل">مؤجل</option>
      </select>
      <select id="branchFilter">
        <option value="الكل">كل الفروع</option>
        <option value="الدمام">الدمام</option>
        <option value="الرياض">الرياض</option>
      </select>
    </section>

    <section id="tableView" class="card">
      <div class="section-head">
        <h2>الجدول</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الأسبوع</th>
              <th>التاريخ</th>
              <th>النوع</th>
              <th>المصور</th>
              <th>المهندس</th>
              <th>الفرع</th>
              <th>الحالة</th>
              <th>السكربت</th>
              <th>تعديل</th>
            </tr>
          </thead>
          <tbody id="tasksTableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="calendarView" class="card hidden">
      <div class="section-head">
        <h2>التقويم</h2>
        <div class="calendar-nav">
          <button id="prevMonthBtn">السابق</button>
          <strong id="monthLabel"></strong>
          <button id="nextMonthBtn">التالي</button>
        </div>
      </div>
      <div class="calendar-weekdays" id="calendarWeekdays"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>
  </div>

  <div id="taskModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="taskModalTitle">إضافة مهمة</h3>
        <button class="close-btn" data-close="taskModal">×</button>
      </div>

      <div class="form-grid">
        <div>
          <label>رقم الأسبوع</label>
          <input id="taskWeek" type="number" />
        </div>
        <div>
          <label>التاريخ</label>
          <input id="taskDate" type="date" />
        </div>
      </div>

      <div class="subcard">
        <h4>الحلقة الأساسية</h4>
        <div class="form-grid">
          <div>
            <label>المصور الأساسي</label>
            <select id="mainPhotographer"></select>
          </div>
          <div>
            <label>مهندس الأساسية</label>
            <select id="mainEngineer"></select>
          </div>
          <div>
            <label>الحالة</label>
            <select id="mainStatus">
              <option value="مجدول">مجدول</option>
              <option value="قيد التنفيذ">قيد التنفيذ</option>
              <option value="مكتمل">مكتمل</option>
              <option value="مؤجل">مؤجل</option>
            </select>
          </div>
          <div class="full">
            <label>سكربت الأساسية</label>
            <textarea id="mainScript" rows="3"></textarea>
          </div>
        </div>
      </div>

      <div class="subcard">
        <h4>التنسيقات</h4>
        <div class="form-grid">
          <div>
            <label>مصور التنسيقات</label>
            <select id="coordPhotographer"></select>
          </div>
          <div>
            <label>مهندس التنسيقات</label>
            <select id="coordEngineer"></select>
          </div>
          <div>
            <label>الحالة</label>
            <select id="coordStatus">
              <option value="مجدول">مجدول</option>
              <option value="قيد التنفيذ">قيد التنفيذ</option>
              <option value="مكتمل">مكتمل</option>
              <option value="مؤجل">مؤجل</option>
            </select>
          </div>
          <div class="full">
            <label>سكربت التنسيقات</label>
            <textarea id="coordScript" rows="3"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="secondary" data-close="taskModal">إلغاء</button>
        <button id="saveTaskBtn">حفظ</button>
      </div>
    </div>
  </div>

  <div id="manageModal" class="modal hidden">
    <div class="modal-box large">
      <div class="modal-head">
        <h3>إدارة الأشخاص</h3>
        <button class="close-btn" data-close="manageModal">×</button>
      </div>

      <div class="manage-grid">
        <div class="subcard">
          <h4>المصورون</h4>
          <div class="inline-form">
            <input id="newPhotographerName" type="text" placeholder="اسم المصور" />
            <select id="newPhotographerRole">
              <option value="main">أساسي</option>
              <option value="coordination">تنسيقات</option>
            </select>
            <button id="addPhotographerBtn">إضافة</button>
          </div>
          <div id="photographersList" class="list"></div>
        </div>

        <div class="subcard">
          <h4>المهندسون</h4>
          <div class="inline-form">
            <input id="newEngineerName" type="text" placeholder="اسم المهندس" />
            <select id="newEngineerBranch">
              <option value="الدمام">الدمام</option>
              <option value="الرياض">الرياض</option>
            </select>
            <button id="addEngineerBtn">إضافة</button>
          </div>
          <div id="engineersList" class="list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
